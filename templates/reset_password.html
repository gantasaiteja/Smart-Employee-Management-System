{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Reset Employee Password</h3>

        </div>

        <div class="card-body">

            <h5>{{ employee.employee_id }} - {{ employee.name }}</h5>

            <form method="POST">

                <div class="mb-3">

                    <label>New Password</label>

                    <input
                        type="password"
                        name="new_password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Update Password

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
